---
name: homelab

services:
  jellyfin:
    image: ghcr.io/hotio/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    group_add:
      - ${JELLYFIN_RENDER_GROUP}
    volumes:
      - ./appdata/jellyfin:/config
      - ./data/media:/data/media
    ports:
      - "8096:8096"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    networks:
      - proxy
      - media
    profiles:
      - media
      - all
    restart: unless-stopped

  radarr:
    image: ghcr.io/hotio/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/radarr:/config
      - ./data:/data
    ports:
      - "127.0.0.1:7878:7878"
    networks:
      - proxy
      - media
    profiles:
      - media
      - all
    restart: unless-stopped

  sonarr:
    image: ghcr.io/hotio/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/sonarr:/config
      - ./data:/data
    ports:
      - "127.0.0.1:8989:8989"
    networks:
      - proxy
      - media
    profiles:
      - media
      - all
    restart: unless-stopped

  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/prowlarr:/config
    ports:
      - "127.0.0.1:9696:9696"
    networks:
      - proxy
      - media
    profiles:
      - media
      - all
    restart: unless-stopped

  qbittorrent:
    image: ghcr.io/hotio/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORTS=8080/tcp,8080/udp
    volumes:
      - ./appdata/qbittorrent:/config
      - ./data/torrents:/data/torrents
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - proxy
      - media
    profiles:
      - media
      - all
    restart: unless-stopped

  seerr:
    image: ghcr.io/hotio/seerr:latest
    container_name: seerr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/seerr:/config
    ports:
      - "127.0.0.1:5055:5055"
    networks:
      - proxy
      - media
    profiles:
      - media
      - all
    restart: unless-stopped

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD_HASH=${WG_ADMIN_PASSWORD_HASH}
    volumes:
      - ./appdata/wg-easy:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "127.0.0.1:51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - proxy
    profiles:
      - vpn
      - all
    restart: unless-stopped

  beszel-hub:
    image: henrygd/beszel:0.18.7
    container_name: beszel-hub
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./appdata/beszel/hub:/beszel_data
      - ./appdata/beszel/socket:/beszel_socket
    ports:
      - "127.0.0.1:8090:8090"
    networks:
      - proxy
      - monitoring
    profiles:
      - monitoring
      - all
    restart: unless-stopped

  beszel-agent:
    image: henrygd/beszel-agent-intel:0.18.7
    container_name: beszel-agent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - LISTEN=/beszel_socket/beszel.sock
      - KEY=${BESZEL_KEY}
      - TOKEN=${BESZEL_TOKEN}
      - HUB_URL=http://localhost:8090
    volumes:
      - ./appdata/beszel/agent:/var/lib/beszel-agent
      - ./appdata/beszel/socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    cap_add:
      - PERFMON
    devices:
      - /dev/dri:/dev/dri
    network_mode: host
    profiles:
      - monitoring
      - all
    restart: unless-stopped

  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    volumes:
      - ./appdata/adguard/work:/opt/adguardhome/work
      - ./appdata/adguard/conf:/opt/adguardhome/conf
    network_mode: host
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3000:3000/tcp"
    profiles:
      - network
      - all
    restart: unless-stopped

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    volumes:
      - ./appdata/nginx-proxy-manager/data:/data
      - ./appdata/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:81:81"
    networks:
      - proxy
    profiles:
      - network
      - all
    restart: unless-stopped

  cloudflare-ddns:
    image: timothyjmiller/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - CF_DDNS_API_TOKEN=${CF_DDNS_API_TOKEN}
      - CF_DDNS_ZONE_ID=${CF_DDNS_ZONE_ID}
      - CF_DDNS_SUBDOMAIN=${CF_DDNS_SUBDOMAIN}
    volumes:
      - ./appdata/cloudflare-ddns/config.json:/config.json
    profiles:
      - vpn
      - all
    restart: unless-stopped

  zigbee2mqtt:
    image: ghcr.io/koenkk/zigbee2mqtt:latest
    container_name: zigbee2mqtt
    user: "${PUID}:${PGID}"
    environment:
      - TZ=${TZ}
    volumes:
      - ./appdata/zigbee2mqtt:/app/data
      - /run/udev:/run/udev:ro
    ports:
      - "127.0.0.1:8081:8080"
    devices:
      - ${ZIGBEE_ADAPTER_PATH}:${ZIGBEE_ADAPTER_PATH}
    group_add:
      - ${ZIGBEE_ADAPTER_GROUP}
    networks:
      - proxy
      - iot
    profiles:
      - iot
      - all
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    user: "${PUID}:${PGID}"
    environment:
      - TZ=${TZ}
    volumes:
      - ./appdata/mosquitto/config:/mosquitto/config
      - ./appdata/mosquitto/data:/mosquitto/data
      - ./appdata/mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      - proxy
      - iot
    profiles:
      - iot
      - all
    restart: unless-stopped

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    user: "${PUID}:${PGID}"
    environment:
      - TZ=${TZ}
    volumes:
      - ./appdata/homeassistant:/config
    ports:
      - "127.0.0.1:8123:8123"
    networks:
      - proxy
      - iot
    profiles:
      - iot
      - all
    restart: unless-stopped

networks:
  proxy:
  media:
  iot:
  monitoring:
